<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <style>
      .grid { stroke: #e0e0e0; stroke-width: 0.5; }
      .axis { stroke: black; stroke-width: 1.5; }
      .tick { stroke: black; stroke-width: 1; }
      .label { font-size: 11px; font-family: Arial, sans-serif; }
      .parabola { stroke: #0066cc; stroke-width: 2; fill: none; }
      .vertex { fill: #ff0000; stroke: #ff0000; stroke-width: 1; }
    </style>
  </defs>

  <!-- Grid lines -->
  <g class="grid">
    <line x1="20" y1="20" x2="20" y2="280"/>
    <line x1="52" y1="20" x2="52" y2="280"/>
    <line x1="84" y1="20" x2="84" y2="280"/>
    <line x1="116" y1="20" x2="116" y2="280"/>
    <line x1="148" y1="20" x2="148" y2="280"/>
    <line x1="180" y1="20" x2="180" y2="280"/>
    <line x1="212" y1="20" x2="212" y2="280"/>
    <line x1="244" y1="20" x2="244" y2="280"/>
    <line x1="276" y1="20" x2="276" y2="280"/>

    <line x1="20" y1="20" x2="280" y2="20"/>
    <line x1="20" y1="52" x2="280" y2="52"/>
    <line x1="20" y1="84" x2="280" y2="84"/>
    <line x1="20" y1="116" x2="280" y2="116"/>
    <line x1="20" y1="148" x2="280" y2="148"/>
    <line x1="20" y1="180" x2="280" y2="180"/>
    <line x1="20" y1="212" x2="280" y2="212"/>
    <line x1="20" y1="244" x2="280" y2="244"/>
    <line x1="20" y1="276" x2="280" y2="276"/>
  </g>

  <!-- Axes -->
  <line x1="20" y1="276" x2="280" y2="276" class="axis"/>
  <line x1="20" y1="20" x2="20" y2="276" class="axis"/>

  <!-- Tick marks on x-axis -->
  <g class="tick">
    <line x1="20" y1="272" x2="20" y2="280"/>
    <line x1="52" y1="272" x2="52" y2="280"/>
    <line x1="84" y1="272" x2="84" y2="280"/>
    <line x1="116" y1="272" x2="116" y2="280"/>
    <line x1="148" y1="272" x2="148" y2="280"/>
    <line x1="180" y1="272" x2="180" y2="280"/>
    <line x1="212" y1="272" x2="212" y2="280"/>
    <line x1="244" y1="272" x2="244" y2="280"/>
    <line x1="276" y1="272" x2="276" y2="280"/>
  </g>

  <!-- Tick marks on y-axis -->
  <g class="tick">
    <line x1="16" y1="276" x2="24" y2="276"/>
    <line x1="16" y1="244" x2="24" y2="244"/>
    <line x1="16" y1="212" x2="24" y2="212"/>
    <line x1="16" y1="180" x2="24" y2="180"/>
    <line x1="16" y1="148" x2="24" y2="148"/>
    <line x1="16" y1="116" x2="24" y2="116"/>
    <line x1="16" y1="84" x2="24" y2="84"/>
    <line x1="16" y1="52" x2="24" y2="52"/>
    <line x1="16" y1="20" x2="24" y2="20"/>
  </g>

  <!-- Axis labels -->
  <g class="label">
    <!-- x-axis labels -->
    <text x="20" y="295" text-anchor="middle">0</text>
    <text x="52" y="295" text-anchor="middle">1</text>
    <text x="84" y="295" text-anchor="middle">2</text>
    <text x="116" y="295" text-anchor="middle">3</text>
    <text x="148" y="295" text-anchor="middle">4</text>

    <!-- y-axis labels -->
    <text x="5" y="280" text-anchor="end" dominant-baseline="middle">0</text>
    <text x="5" y="248" text-anchor="end" dominant-baseline="middle">1</text>
    <text x="5" y="216" text-anchor="end" dominant-baseline="middle">2</text>
    <text x="5" y="184" text-anchor="end" dominant-baseline="middle">3</text>
    <text x="5" y="152" text-anchor="end" dominant-baseline="middle">4</text>
    <text x="5" y="120" text-anchor="end" dominant-baseline="middle">5</text>
  </g>

  <!-- Parabola: f(x) = (x-2)^2 + 1
       Points: (0,5), (1,2), (2,1), (3,2), (4,5)
       Using bezier curve for smooth rendering -->
  <path class="parabola" d="M 20,244 Q 25,235 30,227 Q 35,219 40,212 Q 45,206 50,201 Q 55,197 60,194 Q 65,192 70,191 Q 75,191 80,192 Q 85,194 90,197 Q 95,201 100,206 Q 105,212 110,219 Q 115,227 120,235 Q 125,244 130,254"/>

  <!-- Vertex point at (2, 1) -->
  <circle cx="84" cy="244" r="4" class="vertex"/>

  <!-- Axis labels with italics -->
  <text x="290" y="140" class="label" font-style="italic">f(x)</text>
  <text x="150" y="310" class="label" font-style="italic" text-anchor="middle">x</text>
</svg>
