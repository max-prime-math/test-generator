<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <rect width="180" height="180" rx="40" fill="#2563eb"/>
  <!-- Bold integral symbol -->
  <g transform="translate(90, 90)">
    <!-- Integral curve: S-shaped line -->
    <path d="M -8,-50 Q -30,-30 -30,-5 Q -30,20 -8,35 Q 8,48 25,55"
          fill="none" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Top serif -->
    <line x1="-8" y1="-50" x2="15" y2="-50" stroke="white" stroke-width="12" stroke-linecap="round"/>
    <!-- Bottom serif -->
    <line x1="25" y1="55" x2="50" y2="55" stroke="white" stroke-width="12" stroke-linecap="round"/>
  </g>
</svg>
