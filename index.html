<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="A lightweight, browser-based math test generator. Everything runs locally with no account or server needed." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="%BASE_URL%manifest.json" />

    <!-- iOS Home Screen -->
    <link rel="apple-touch-icon" sizes="152x152" href="%BASE_URL%apple-touch-icon-152.png?v=3" />
    <link rel="apple-touch-icon" sizes="167x167" href="%BASE_URL%apple-touch-icon-167.png?v=3" />
    <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%apple-touch-icon.png?v=3" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg?v=2" sizes="any" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Test Gen" />

    <title>Test Generator</title>
  </head>
  <body>
    <div id="app"></div>
    <script>
      (() => {
        if (!new URLSearchParams(window.location.search).has('debug')) return;
        const showError = (message) => {
          const box = document.createElement('pre');
          box.style.cssText = 'position:fixed;inset:12px;z-index:2147483647;overflow:auto;padding:12px;background:#111827;color:#f9fafb;border:2px solid #ef4444;border-radius:6px;font:13px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre-wrap;';
          box.textContent = `Startup error:\n\n${message}`;
          document.body.appendChild(box);
        };
        window.addEventListener('error', (event) => {
          showError(event.error?.stack || event.message || String(event.error));
        });
        window.addEventListener('unhandledrejection', (event) => {
          showError(event.reason?.stack || event.reason?.message || String(event.reason));
        });
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
